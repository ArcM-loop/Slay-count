query ListAllTasks @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  tasks {
    id
    title
    description
    completed
    createdAt
  }
}

mutation CreateTask($title: String!, $description: String!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  task_insert(data: {
    title: $title,
    description: $description,
    completed: false,
    createdAt_expr: "request.time"
  })
}

mutation UpdateTaskStatus($id: UUID!, $completed: Boolean!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  task_update(key: {id: $id}, data: {
    completed: $completed
  })
}

query GetTaskById($id: UUID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  task(key: {id: $id}) {
    id
    title
    description
    completed
    createdAt
  }
}